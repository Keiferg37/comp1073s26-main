<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Story Maker | COMP1073 Client-Side JavaScript</title>
</head>
<body>
    <h1>Story Maker</h1>

    <!-- 5 sentence-part buttons -->
    <button class="word-btn" data-part="0" type="button"></button>
        <span class="label" id="word0">The turkey</span>
    <button class="word-btn" data-part="1" type="button"></button>
        <span class="label" id="word1">sat on</span>
    <button class="word-btn" data-part="2" type="button"></button>
        <span class="label" id="word2">a funny</span>
    <button class="word-btn" data-part="3" type="button"></button>
        <span class="label" id="word3">goat</span>
    <button class="word-btn" data-part="4" type="button"></button>
        <span class="label" id="word4">on the moon</span>

    <!-- button to show the finished story and place to show it-->
    <button id="tellBtn" type="button">Tell the story</button>
    <section id="story"></section>
</body>
</html>
